name: CI/CD Build & Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repo
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest
          no-cache: true

      - name: Copy docker-compose to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.PORT_SERVER }}
          source: "docker-compose.yml"
          target: ${{ secrets.PATH_SERVER }}

      - name: Deploy & Generate Env
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.PORT_SERVER }}
          script: |
            cd ${{ secrets.PATH_SERVER }}

            # สร้างไฟล์ .env ใหม่ (อัปเดตแค่ค่า Link API และคงค่าอื่นๆ ไว้)
            cat > .env << ENVEOF
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            APP_PORT=${{ secrets.APP_PORT }}
            TUNNEL_TOKEN_KEY=${{ secrets.TUNNEL_TOKEN_KEY }}

            # 🟢 จุดที่เปลี่ยน: ดึงค่า API URL จาก GitHub Secret มาใส่ให้ TypeScript เห็นด้วย
            NEXT_PUBLIC_AXUM_API_URL=${{ secrets.AXUM_API_URL }}
            AXUM_API_URL=${{ secrets.AXUM_API_URL }}

            DATABASE_URL=${{ secrets.DATABASE_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            ENVEOF

            # สั่ง Login และ Deploy ตามปกติ
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            docker compose pull
            docker compose up -d --force-recreate --remove-orphans

            docker image prune -f
