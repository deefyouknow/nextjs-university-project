name: CI/CD Build & Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

jobs:
  deploy-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase Repo
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}:latest
          no-cache: true

      - name: Copy docker-compose to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.PORT_SERVER }}
          source: "docker-compose.yml"
          target: ${{ secrets.PATH_SERVER }}

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.PORT_SERVER }}
          script: |
            cd ${{ secrets.PATH_SERVER }}

            # 1. สร้างไฟล์ .env บน Server (เพื่อให้ Docker และ Next.js มองเห็นตัวแปร)
            cat > .env << ENVEOF
            APP_PORT=3000
            TUNNEL_TOKEN_KEY=${{ secrets.TUNNEL_TOKEN_KEY }}
            AXUM_API_URL=${{ secrets.AXUM_API_URL }}
            NEXT_PUBLIC_AXUM_API_URL=${{ secrets.AXUM_API_URL }}
            REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
            ENVEOF

            # 2. Login Docker บน Server ก่อนสั่ง Pull (แก้ปัญหา denied จากรอบที่แล้ว)
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 3. รันระบบ
            docker compose pull
            docker compose up -d --force-recreate --remove-orphans
            docker image prune -f
